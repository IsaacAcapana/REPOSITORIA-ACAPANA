<html>
    <head>
        <title></title>
        <style>
            *{
                margin: 0px;
                padding: 0px;
            }
            .contenedor{
                width: 800px;
                height: 300px;
                border: 1px solid black;
                margin: 0 auto;
                position: relative;
                overflow: hidden;
            }
            .cuadrito{
                width: 100px;
                height: 100px;
                position: absolute;
                top: 0px;
                left:0px;
                animation: cuadrito 4s infinite;
            }
            .cuadrito2{
                width: 100px;
                height: 100px;
                position: absolute;
                top: 0px;
                left:0px;
                animation: cuadrito 6s infinite;
            }

            .abeja{
                position: absolute;
                width: 100%;
                z-index:0;
            }
            .abeja2{
                position: absolute;
                width: 100%;
                z-index:0;
            }
            @keyframes cuadrito{
                0%{
                    top: 100px;
                    left: -100px;
                    rotate: 45deg;
                }
                33%{
                    top: 0px;
                    left: 350px;
                    rotate: 0deg;
                }
                66%{
                    top: 200px;
                    left: 350px;
                    rotate: 45deg;
                }
                100%{
                    top: 100px;
                    left: 800px;
                    rotate: 0deg;
                }
            }
        
            @keyframes cuadrito2{
                0%{
                    top: 100px;
                    left: -100px;
                    rotate: 45deg;
                }
                33%{
                    top: 0px;
                    left: 350px;
                    rotate: 0deg;
                }
                66%{
                    top: 200px;
                    left: 350px;
                    rotate: 45deg;
                }
                100%{
                    top: 100px;
                    left: 800px;
                    rotate: 0deg;
                }
            }

        .paisaje{
            position: absolute;
            top: -450px;
            left: 0px;
            width: 100%;
            z-index:-1;
        }
        .cielo{
            position: absolute;
            top: 0px;
            left: 0px;
            width: 100%;
            z-index:-2;
        }
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="cuadrito">
                <img class="abeja" src="img/img1.png" alt="">
            </div>
            <div class="cuadrito2">
                <img class="abeja2" src="img/img1.png" alt="">
            </div>
            <img class="cielo" src="img/cielo.png" alt="">
            <img class="paisaje" src="img/paisaje.png" alt="">
        </div>
    </body>
</html>
