<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIPPATH SEMANA 6</title>

    <style>

        *{
            padding: 0px;
            margin: 0px;
        }

        body{
            height: 200vh;
            overflow-x: hidden;
        }

        .contenedor{
            width: 100%;
            height: 100vh;
            background-position: center;
            background-image: url(img/T1.jpg);
            background-size: 100%;
            border: 1px solid black;
            background-color: white;
            position: relative;
            margin:0 auto;
            overflow: hidden;
        }

        /* PERSONAJE */
        .marco1{
            width: 100%;
            height: 100%;

            background-image: url(img/T2-removebg-preview\ \(1\).png);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;

            top: 0px;
            left: 0px;
            position: absolute;
            z-index: 2;
            transition: 0.1s linear;
        }

        /* OBJETO CENTRAL */
        .marco3{
            width: 35%;
            height: 35%;

            background-image: url(img/T3-removebg-preview.png);
            background-size: contain;
            background-repeat: no-repeat;

            position: absolute;
            top: 10%;
            left: 50%;

            transform: translateX(-50%);

            z-index: 1;
            background-position: center;
            transition: 0.1s linear;
        }

        /* NUBES */
        .marco4{
            width: 100%;
            height: 35%;

            background-image: url(img/T5.png);
            background-size: cover;
            background-repeat: no-repeat;

            position: absolute;
            top: 0px;
            left: 0px;

            z-index: 1;
            background-position: center;
            transition: 0.1s linear;
        }

    </style>
</head>

<body>

    <div class="contenedor">

        <div class="marco1"></div>

        <div class="marco3"></div>

        <div class="marco4"></div>

    </div>

    <script>

        let marco1 = document.querySelector(".marco1");
        let marco3 = document.querySelector(".marco3");
        let marco4 = document.querySelector(".marco4");

        window.addEventListener("scroll", function(){

            let scroll = window.scrollY;

            marco4.style.transform =
            `translateY(${scroll * 0.3}px)`;

            marco3.style.transform =
            `translateY(${scroll * 0.7}px) translateX(-50%)`;

            marco1.style.transform =
            `translateY(${scroll * 1}px)`;

        });

    </script>

</body>
</html>
