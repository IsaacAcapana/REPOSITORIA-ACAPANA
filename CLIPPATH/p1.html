<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallax</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.contenedor{
width:700px;
height:700px;
position:relative;
overflow:hidden;
}

.fondo{
width:110%;
height:110%;
background-image:url(img/T1.jpg);
background-size:cover;
background-position:center;
position:absolute;
top:-5%;
left:-5%;
z-index:1;
animation:moverFondo 12s ease-in-out infinite alternate;
}

.marco1{
width:700px;
height:500px;
background-image:url(img/T2-removebg-preview\ \(1\).png);
background-size:cover;
background-position:center;
position:absolute;
top:200px;
left:0;
z-index:4;
animation:moverPersonaje 6s ease-in-out infinite alternate;
}

.marco3{
width:200px;
height:200px;
background-image:url(img/T3-removebg-preview.png);
background-size:cover;
background-position:center;
position:absolute;
top:100px;
left:280px;
z-index:3;
animation:moverObjeto 4s ease-in-out infinite alternate;
}

.marco4{
width:700px;
height:200px;
background-image:url(img/T5.png);
background-size:cover;
background-position:center;
position:absolute;
top:0;
left:0;
z-index:2;
opacity:0.8;
animation:moverNubes 10s linear infinite alternate;
}

@keyframes moverFondo{
from{
transform:scale(1) translateX(-10px) translateY(-10px);
}
to{
transform:scale(1.1) translateX(10px) translateY(10px);
}
}

@keyframes moverNubes{
from{
transform:translateX(-20px);
}
to{
transform:translateX(20px);
}
}

@keyframes moverObjeto{
from{
transform:translateY(-10px) rotate(-5deg);
}
to{
transform:translateY(10px) rotate(5deg);
}
}

@keyframes moverPersonaje{
from{
transform:translateY(0px);
}
to{
transform:translateY(20px);
}
}

</style>
</head>

<body>

<div class="contenedor">
<div class="fondo"></div>
<div class="marco4"></div>
<div class="marco3"></div>
<div class="marco1"></div>
</div>

</body>
</html>
